name: Update BSR Rankings Daily

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC = 7:30 AM IST daily
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install curl_cffi beautifulsoup4 lxml

      - name: Configure git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Run BSR scraper
        run: python scripts/scrape_bsr.py
        continue-on-error: true

      - name: Commit any remaining rankings
        run: |
          git add data/rankings.json
          git diff --staged --quiet || git commit -m "chore: update BSR rankings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

      - name: Upload dashboard to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy-pages:
    needs: update-rankings
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
